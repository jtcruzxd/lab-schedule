<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | OMSC Lab Schedule</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--clr-bg); }
    .auth-card {
      background:#fff; border-radius:var(--radius-lg); box-shadow:var(--shadow-page);
      width:100%; max-width:420px; overflow:hidden;
    }
    .auth-header {
      background:linear-gradient(135deg,#1a3a6b,#2d5fa6);
      color:#fff; padding:28px 32px 20px; text-align:center;
    }
    .auth-header h1 { font-size:18px; font-weight:800; margin:8px 0 4px; }
    .auth-header p  { font-size:12px; opacity:.75; }
    .auth-body { padding:28px 32px; }
    .auth-tabs { display:flex; border-bottom:2px solid #e2e8f0; margin-bottom:20px; }
    .auth-tab {
      flex:1; padding:9px; text-align:center; font-size:13px; font-weight:600;
      background:none; border:none; cursor:pointer; color:#718096;
      border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s;
    }
    .auth-tab.active { color:#1a3a6b; border-bottom-color:#1a3a6b; }
    .auth-section { display:none; }
    .auth-section.active { display:block; }
    .form-label { font-size:11px; font-weight:700; color:#1a3a6b; text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:4px; }
    .auth-input {
      width:100%; padding:9px 12px; font-size:13px; font-family:inherit;
      border:1.5px solid #dde5ef; border-radius:6px; background:#fafbfc;
      margin-bottom:14px; transition:border-color .15s;
    }
    .auth-input:focus { outline:none; border-color:#2d5fa6; background:#fff; }
    .auth-btn {
      width:100%; padding:10px; background:#1a3a6b; color:#fff;
      font-size:13px; font-weight:700; border:none; border-radius:6px;
      cursor:pointer; transition:background .15s; margin-top:4px;
    }
    .auth-btn:hover { background:#2d5fa6; }
    .auth-msg { font-size:12px; margin-top:10px; padding:8px 12px; border-radius:6px; display:none; }
    .auth-msg.success { background:#e8f5e9; color:#2e7d32; display:block; }
    .auth-msg.error   { background:#ffebee; color:#c62828; display:block; }
    .forgot-link { font-size:11px; color:#2d5fa6; cursor:pointer; text-decoration:underline; float:right; margin-top:-10px; margin-bottom:14px; display:block; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <div style="font-size:28px">🖥️</div>
    <h1>OMSC Lab Schedule</h1>
    <p>Computer Laboratory — Main Campus</p>
  </div>
  <div class="auth-body">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Register</button>
      <button class="auth-tab" data-tab="forgot">Forgot Password</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-section active" id="tab-login">
      <label class="form-label">Email</label>
      <input type="email" id="login-email" class="auth-input" />
      <label class="form-label">Password</label>
      <input type="password" id="login-pass" class="auth-input" />
      <button class="auth-btn" id="loginBtn">Sign In</button>
      <div class="auth-msg" id="login-msg"></div>
    </div>

    <!-- REGISTER -->
    <div class="auth-section" id="tab-register">
      <label class="form-label">Full Name</label>
      <input type="text" id="reg-name" class="auth-input" />
      <label class="form-label">Email</label>
      <input type="email" id="reg-email" class="auth-input" />
      <label class="form-label">Password (min 6 characters)</label>
      <input type="password" id="reg-pass" class="auth-input" />
      <button class="auth-btn" id="registerBtn">Create Account</button>
      <div class="auth-msg" id="reg-msg"></div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div class="auth-section" id="tab-forgot">
      <p style="font-size:12px;color:#718096;margin-bottom:14px">Enter your email and we'll send you a link to reset your password.</p>
      <label class="form-label">Email</label>
      <input type="email" id="forgot-email" class="auth-input" />
      <button class="auth-btn" id="forgotBtn">Send Reset Email</button>
      <div class="auth-msg" id="forgot-msg"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           sendPasswordResetEmail, updateProfile, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyC0q5d1CebfI7_52YyRlyI84PpzrevLiOQ",
    authDomain:        "omsc-lab-schedule.firebaseapp.com",
    projectId:         "omsc-lab-schedule",
    storageBucket:     "omsc-lab-schedule.firebasestorage.app",
    messagingSenderId: "225638311654",
    appId:             "1:225638311654:web:841778f26d3150cde33d27"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Redirect to main page if already logged in
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'index.html';
  });

  // ── Tabs ──
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab, .auth-section').forEach(el => el.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'auth-msg ' + type;
  }

  // ── Login ──
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = 'index.html';
    } catch(e) {
      showMsg('login-msg', friendlyError(e.code), 'error');
    }
  });

  // ── Register ──
  document.getElementById('registerBtn').addEventListener('click', async () => {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    if (!name) { showMsg('reg-msg','Please enter your full name.','error'); return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      showMsg('reg-msg', 'Account created! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch(e) {
      showMsg('reg-msg', friendlyError(e.code), 'error');
    }
  });

  // ── Forgot password ──
  document.getElementById('forgotBtn').addEventListener('click', async () => {
    const email = document.getElementById('forgot-email').value.trim();
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('forgot-msg', `Password reset email sent to ${email}. Check your inbox.`, 'success');
    } catch(e) {
      showMsg('forgot-msg', friendlyError(e.code), 'error');
    }
  });

  function friendlyError(code) {
    const map = {
      'auth/user-not-found':      'No account found with that email.',
      'auth/wrong-password':      'Incorrect password.',
      'auth/email-already-in-use':'That email is already registered.',
      'auth/weak-password':       'Password must be at least 6 characters.',
      'auth/invalid-email':       'Please enter a valid email address.',
      'auth/too-many-requests':   'Too many attempts. Try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
